name: EduTrade
options:
  bundleIdPrefix: qa.udst.edutrade
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    SWIFT_STRICT_CONCURRENCY: minimal
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    CODE_SIGN_STYLE: Automatic
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGN_IDENTITY: ""
    GENERATE_INFOPLIST_FILE: YES
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "1.0"

targets:
  EduTrade:
    type: application
    platform: iOS
    sources:
      - path: EduTrade
        excludes:
          - "Info.plist"
    resources:
      - path: EduTrade/Resources
    info:
      path: EduTrade/Info.plist
      properties:
        CFBundleDisplayName: EduTrade
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiredDeviceCapabilities:
          - armv7
        NSCameraUsageDescription: "EduTrade needs camera access so you can take photos of the textbooks and materials you want to sell."
        NSPhotoLibraryUsageDescription: "EduTrade needs photo library access so you can select photos of the items you want to list for sale."
        ITSAppUsesNonExemptEncryption: false
        CFBundleLocalizations:
          - en
          - ar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: qa.udst.edutrade.app
        INFOPLIST_KEY_CFBundleDisplayName: EduTrade
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

  EduTradeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: EduTradeTests
        excludes:
          - "EduTradeUITests.swift"
    dependencies:
      - target: EduTrade
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: qa.udst.edutrade.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/EduTrade.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/EduTrade"
        BUNDLE_LOADER: "$(TEST_HOST)"

  EduTradeUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: EduTradeUITests
    dependencies:
      - target: EduTrade
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: qa.udst.edutrade.uitests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  EduTrade:
    build:
      targets:
        EduTrade: all
        EduTradeTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - EduTradeTests
        - EduTradeUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
